<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muslim Pro | Market</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #090b10; --panel: #161b22; --gold: #f3ba2f; --text: #e6edf3; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 20px; }

        /* Header */
        .store-header { 
            position: sticky; top: 0; background: var(--panel); 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #30363d; z-index: 100;
        }
        .diamond-badge { 
            background: rgba(243,186,47,0.1); color: var(--gold); 
            padding: 6px 15px; border-radius: 20px; font-weight: bold; 
            border: 1px solid var(--gold); font-size: 14px;
        }

        .container { padding: 15px; }
        .cat-title { 
            color: var(--gold); font-size: 12px; margin: 20px 0 10px; 
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
        }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { 
            background: var(--panel); border-radius: 20px; padding: 20px; 
            text-align: center; border: 1px solid #30363d; position: relative;
        }
        .card h1 { font-size: 40px; margin: 10px 0; }
        
        .buy-btn { 
            width: 100%; padding: 10px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
            background: var(--gold); color: #000; transition: 0.2s;
        }
        .buy-btn:active { transform: scale(0.95); }
        
        /* Owned Styling */
        .owned { background: #21262d !important; color: #484f58 !important; cursor: default; }
        
        .back-btn { text-decoration: none; color: #8b949e; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="store-header">
        <a href="op.html" class="back-btn">❮ BACK</a>
        <b style="letter-spacing:1px;">MARKET</b>
        <div class="diamond-badge">💎 <span id="v-diamonds">0</span></div>
    </div>

    <div class="container">
        <div id="store-render">
            <p style="text-align:center; opacity:0.5; margin-top:50px;">Loading Items...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let uData = null;

        const shopItems = {
            "Premium Avatars": ["🦁","🦅","🐯","🐉","🔥","💎","🌟","⚔️","👑","🎮","🧿","☪️","🕋","🕌"],
            "Profile Banners": ["🇸🇦","🇵🇰","🏴","🚩","🌈","🌊","❄️","✨","🌙","🕋","🕌"]
        };

        auth.onAuthStateChanged(user => {
            if(!user) { window.location.href = "index.html"; }
            else {
                db.ref('users/' + user.uid).on('value', s => {
                    uData = s.val();
                    if(uData) {
                        document.getElementById('v-diamonds').innerText = uData.diamonds || 0;
                        renderStore();
                    }
                });
            }
        });

        function renderStore() {
            let html = '';
            for(let cat in shopItems) {
                html += `<div class="cat-title">${cat}</div><div class="grid">`;
                shopItems[cat].forEach(item => {
                    let isOwned = (uData.inventory || []).includes(item);
                    html += `
                        <div class="card">
                            <h1>${item}</h1>
                            <button onclick="buy('${item}')" class="buy-btn ${isOwned ? 'owned' : ''}" ${isOwned ? 'disabled' : ''}>
                                ${isOwned ? 'OWNED' : '300 💎'}
                            </button>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            document.getElementById('store-render').innerHTML = html;
        }

        async function buy(item) {
            if(uData.diamonds < 300) {
                alert("Diamonds nahi hain! Ads dekho.");
                return;
            }

            let currentInv = uData.inventory || [];
            if(!currentInv.includes(item)) {
                currentInv.push(item);
                try {
                    await db.ref('users/' + auth.currentUser.uid).update({
                        diamonds: uData.diamonds - 300,
                        inventory: currentInv
                    });
                    alert("Mubarak! Item khareed liya gaya.");
                } catch(e) {
                    alert("Error: " + e.message);
                }
            }
        }
    </script>
</body>
</html>
