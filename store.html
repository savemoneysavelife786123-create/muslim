<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store | Testing</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #f3ba2f; --bg: #050505; --panel: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }

        /* Header */
        .header {
            position: sticky; top: 0; background: var(--panel); padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222; z-index: 100;
        }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: bold; }
        .diamond-count { background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); }

        /* Tabs */
        .tabs { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #0a0a0a; }
        .tab-btn { 
            padding: 8px 20px; background: #1a1a1a; border-radius: 10px; 
            border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer;
        }
        .tab-btn.active { background: var(--gold); color: #000; border: none; font-weight: bold; }

        /* Grid */
        .content-area { padding: 15px; padding-bottom: 80px; }
        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .item-card { 
            background: var(--panel); border-radius: 15px; padding: 20px; 
            text-align: center; border: 1px solid #222; transition: 0.3s;
        }
        .item-card h1 { font-size: 50px; margin: 10px 0; }
        .item-price { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; }

        .buy-btn { 
            width: 100%; padding: 10px; border-radius: 10px; border: none;
            background: #222; color: white; font-weight: bold; cursor: pointer;
        }
        .buy-btn.can-buy { background: var(--gold); color: #000; }
        .buy-btn.owned { background: #1a4d1a; color: #fff; cursor: default; }

        /* Scrollbar hide */
        .tabs::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="lobby.html" class="back-btn">❮ EXIT</a>
        <b style="letter-spacing: 2px;">STORE</b>
        <div class="diamond-count">💎 <span id="u-diamonds">0</span></div>
    </div>

    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('avatars', this)">⏰ AVATAR</div>
        <div class="tab-btn" onclick="switchTab('banners', this)">🇸🇦 BANNER</div>
        <div class="tab-btn" onclick="switchTab('badges', this)">📛 BADGE</div>
        <div class="tab-btn" onclick="switchTab('characters', this)">🧍 CHARACTER</div>
    </div>

    <div class="content-area">
        <div id="item-list" class="item-grid">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let userData = null;
        let currentCategory = 'avatars';

        const storeData = {
            avatars: [
                { id: 'a1', val: '🐱', price: 200 }, { id: 'a2', val: '🐶', price: 200 },
                { id: 'a3', val: '🐯', price: 500 }, { id: 'a4', val: '👻', price: 400 }
            ],
            banners: [
                { id: 'bn1', val: '🇵🇰', price: 100 }, { id: 'bn2', val: '🏴', price: 150 },
                { id: 'bn3', val: '🌊', price: 300 }, { id: 'bn4', val: '🔥', price: 300 }
            ],
            badges: [
                { id: 'bd1', val: '🛡️', price: 600 }, { id: 'bd2', val: '⚡', price: 800 },
                { id: 'bd3', val: '💎', price: 1000 }
            ],
            characters: [
                { id: 'c1', val: '🧍‍♀️', price: 1500 }, { id: 'c2', val: '🧍🏼', price: 1500 },
                { id: 'c3', val: '🥷', price: 3000 }, { id: 'c4', val: '🦸', price: 5000 }
            ]
        };

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = "index.html";
            else {
                db.ref('players/' + user.uid).on('value', snap => {
                    userData = snap.val();
                    document.getElementById('u-diamonds').innerText = userData.diamonds;
                    renderItems();
                });
            }
        });

        function switchTab(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            
            const ownedItems = userData.inventory[currentCategory] || [];

            storeData[currentCategory].forEach(item => {
                const isOwned = ownedItems.includes(item.val);
                const canAfford = userData.diamonds >= item.price;
                
                list.innerHTML += `
                    <div class="item-card">
                        <h1>${item.val}</h1>
                        <span class="item-price">${isOwned ? '' : '💎 ' + item.price}</span>
                        <button class="buy-btn ${isOwned ? 'owned' : (canAfford ? 'can-buy' : '')}" 
                                onclick="${isOwned ? '' : `buyItem('${item.val}', ${item.price})`}">
                            ${isOwned ? 'OWNED' : 'BUY'}
                        </button>
                    </div>
                `;
            });
        }

        async function buyItem(val, price) {
            if (userData.diamonds < price) return alert("Not enough diamonds!");

            let inv = userData.inventory;
            if (!inv[currentCategory]) inv[currentCategory] = [];
            inv[currentCategory].push(val);

            await db.ref('players/' + auth.currentUser.uid).update({
                diamonds: userData.diamonds - price,
                inventory: inv
            });
            
            alert("Mubarak! Item kharid liya gaya.");
        }
    </script>
</body>
</html>
