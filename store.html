<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Store | Testing</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #f3ba2f; --bg: #050505; --panel: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        .header { position: sticky; top: 0; background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; z-index: 100; }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: bold; }
        .diamond-count { background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); }
        .tabs { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #0a0a0a; scrollbar-width: none; }
        .tab-btn { padding: 8px 20px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; font-size: 12px; }
        .tab-btn.active { background: var(--gold); color: #000; border: none; font-weight: bold; }
        .content-area { padding: 15px; padding-bottom: 80px; }
        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .item-card { background: var(--panel); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; }
        .item-card h1 { font-size: 45px; margin: 10px 0; }
        .item-price { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; font-size: 14px; }
        .buy-btn { width: 100%; padding: 10px; border-radius: 10px; border: none; background: #222; color: white; font-weight: bold; cursor: pointer; }
        .buy-btn.can-buy { background: var(--gold); color: #000; }
        .buy-btn.owned { background: #1a4d1a; color: #fff; cursor: default; }
    </style>
</head>
<body>

    <div class="header">
        <a href="lobby.html" class="back-btn">❮ EXIT</a>
        <b style="letter-spacing: 2px;">MEGA STORE</b>
        <div class="diamond-count">💎 <span id="u-diamonds">0</span></div>
    </div>

    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('avatars', this)">⏰ AVATARS</div>
        <div class="tab-btn" onclick="switchTab('banners', this)">🚩 BANNERS</div>
        <div class="tab-btn" onclick="switchTab('badges', this)">🎖️ BADGES</div>
        <div class="tab-btn" onclick="switchTab('characters', this)">🧍 CHARS</div>
    </div>

    <div class="content-area">
        <div id="item-list" class="item-grid"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let userData = null;
        let currentCategory = 'avatars';

        const storeData = {
            avatars: [
                { val: '🐱', price: 100 }, { val: '🐶', price: 100 }, { val: '🐯', price: 200 }, { val: '👻', price: 200 },
                { val: '👽', price: 300 }, { val: '🤖', price: 300 }, { val: '🦁', price: 400 }, { val: '🐼', price: 400 },
                { val: '🦊', price: 500 }, { val: '🐲', price: 1000 }
            ],
            banners: [
                { val: '🇵🇰', price: 50 }, { val: '🇸🇦', price: 50 }, { val: '🏴', price: 100 }, { val: '🚩', price: 100 },
                { val: '🌊', price: 200 }, { val: '🔥', price: 200 }, { val: '⚡', price: 300 }, { val: '🌈', price: 300 },
                { val: '🌟', price: 500 }, { val: '🏆', price: 1000 }
            ],
            badges: [
                { val: '🎖️', price: 200 }, { val: '🏅', price: 300 }, { val: '🛡️', price: 400 }, { val: '👑', price: 1000 },
                { val: '💎', price: 1500 }, { val: '🔥', price: 500 }, { val: '⚔️', price: 600 }, { val: '🔱', price: 800 },
                { val: '🌀', price: 700 }, { val: '✨', price: 900 }
            ],
            characters: [
                { val: '🧍', price: 0 }, { val: '🧍‍♂️', price: 1000 }, { val: '🧍‍♀️', price: 1000 }, { val: '🥷', price: 2500 },
                { val: '🤵', price: 2000 }, { val: '🕵️', price: 3000 }, { val: '👮', price: 3500 }, { val: '👩‍🚀', price: 5000 },
                { val: '🎅', price: 4000 }, { val: '🤴', price: 8000 }
            ]
        };

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = "index.html";
            else {
                db.ref('players/' + user.uid).on('value', snap => {
                    userData = snap.val();
                    if(!userData.inventory) userData.inventory = {}; // Error Fix
                    document.getElementById('u-diamonds').innerText = userData.diamonds || 0;
                    renderItems();
                });
            }
        });

        function switchTab(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            const ownedItems = userData.inventory[currentCategory] || [];

            storeData[currentCategory].forEach(item => {
                const isOwned = ownedItems.includes(item.val);
                const canAfford = userData.diamonds >= item.price;
                list.innerHTML += `
                    <div class="item-card">
                        <h1>${item.val}</h1>
                        <span class="item-price">${isOwned ? 'OWNED' : '💎 ' + item.price}</span>
                        <button class="buy-btn ${isOwned ? 'owned' : (canAfford ? 'can-buy' : '')}" 
                                onclick="${isOwned ? '' : `buyItem('${item.val}', ${item.price})`}">
                            ${isOwned ? 'OWNED' : 'BUY'}
                        </button>
                    </div>`;
            });
        }

        async function buyItem(val, price) {
            if (userData.diamonds < price) return alert("Not enough diamonds!");
            
            // Error Fix: Ensure inventory exists
            let inv = userData.inventory || {};
            if (!inv[currentCategory]) inv[currentCategory] = [];
            
            if (inv[currentCategory].includes(val)) return alert("Already owned!");

            inv[currentCategory].push(val);
            await db.ref('players/' + auth.currentUser.uid).update({
                diamonds: userData.diamonds - price,
                inventory: inv
            });
            alert("Success! Item unlocked.");
        }
    </script>
</body>
</html>
