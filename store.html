<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muslim Pro | Market</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #090b10; --panel: #161b22; --gold: #f3ba2f; --text: #e6edf3; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 20px; }

        /* Header */
        .store-header { 
            position: sticky; top: 0; background: var(--panel); 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #30363d; z-index: 100;
        }
        .diamond-display { 
            background: rgba(243,186,47,0.1); color: var(--gold); 
            padding: 6px 15px; border-radius: 20px; font-weight: bold; 
            border: 1px solid rgba(243,186,47,0.3); font-size: 14px;
        }

        .container { padding: 15px; }
        .category-label { 
            color: var(--gold); font-size: 12px; margin: 25px 0 10px; 
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center;
        }
        .category-label::after { content: ''; flex: 1; height: 1px; background: #30363d; margin-left: 10px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { 
            background: var(--panel); border-radius: 20px; padding: 20px; 
            text-align: center; border: 1px solid #30363d; position: relative;
            transition: 0.3s;
        }
        .card h1 { font-size: 45px; margin: 10px 0; }
        
        .buy-btn { 
            width: 100%; padding: 10px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
            background: var(--gold); color: #000; font-size: 13px;
        }
        
        /* State: Owned */
        .is-owned { background: #21262d !important; color: #484f58 !important; pointer-events: none; }
        .owned-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; color: #238636; font-weight: bold; }

        .back-link { text-decoration: none; color: #8b949e; font-size: 18px; }
    </style>
</head>
<body>

    <div class="store-header">
        <a href="op.html" class="back-link">❮ Lobby</a>
        <div style="font-weight:bold; font-size:18px; letter-spacing:1px;">STORE</div>
        <div class="diamond-display">💎 <span id="v-diamonds">0</span></div>
    </div>

    <div class="container">
        <div id="market-content">
            <p style="text-align:center; opacity:0.5; margin-top:50px;">Loading Items...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let uData = null;

        const itemsList = {
            "Premium Avatars": ["🦁","🦅","🐯","🐉","🔥","💎","🌟","⚔️","👑","🎮","🧿","☪️","🕋","🕌"],
            "Profile Banners": ["🇸🇦","🇵🇰","🏴","🚩","🌈","🌊","❄️","✨","🌙","🕋","🕌"]
        };

        auth.onAuthStateChanged(user => {
            if(!user) { window.location.href = "index.html"; }
            else {
                db.ref('users/'+user.uid).on('value', s => {
                    uData = s.val();
                    if(uData) {
                        document.getElementById('v-diamonds').innerText = uData.diamonds || 0;
                        renderMarket();
                    }
                });
            }
        });

        function renderMarket() {
            let html = '';
            for(let cat in itemsList) {
                html += `<div class="category-label">${cat}</div><div class="grid">`;
                itemsList[cat].forEach(item => {
                    let owned = (uData.inventory || []).includes(item);
                    html += `
                        <div class="card">
                            ${owned ? '<span class="owned-badge">✓ OWNED</span>' : ''}
                            <h1>${item}</h1>
                            <button onclick="buyItem('${item}')" class="buy-btn ${owned ? 'is-owned' : ''}">
                                ${owned ? 'COLLECTED' : '300 💎'}
                            </button>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            document.getElementById('market-content').innerHTML = html;
        }

        async function buyItem(item) {
            if(uData.diamonds < 300) {
                return alert("Diamonds khatam hain! Ads dekhein.");
            }

            let newInv = uData.inventory || [];
            if(!newInv.includes(item)) {
                newInv.push(item);
                try {
                    await db.ref('users/'+auth.currentUser.uid).update({
                        diamonds: uData.diamonds - 300,
                        inventory: newInv
                    });
                    alert("Shabash! Naya item mil gaya.");
                } catch(e) { alert("Network error!"); }
            }
        }
    </script>
</body>
</html>
