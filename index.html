<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Game Launcher</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-card { background: #111; padding: 40px 30px; border-radius: 25px; border: 1px solid #222; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 10px; letter-spacing: 2px; color: #f3ba2f; font-size: 28px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        
        .google-btn { background: white; color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s; }
        .google-btn:active { transform: scale(0.95); }
        .google-btn img { width: 20px; }
        
        #status { margin-top: 20px; font-size: 13px; color: #f3ba2f; display: none; font-weight: 500; }
        .loader { border: 3px solid #333; border-top: 3px solid #f3ba2f; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>BATTLE WEB</h1>
        <p>Login to start your journey</p>
        
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
            Continue with Google
        </button>

        <div id="status">
            <div class="loader"></div> <span id="status-text">Verifying...</span>
        </div>
    </div>

    <script>
        // Aapki Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. Handle Redirect Result (Jo page reload ke baad hota hai)
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                handleUser(result.user);
            }
        }).catch((error) => {
            console.error("Redirect Error:", error);
            if(error.code !== "auth/credential-already-in-use") {
                alert("Login Error: " + error.message);
            }
        });

        // 2. Login Function
        function loginWithGoogle() {
            document.getElementById('status').style.display = "block";
            document.getElementById('status-text').innerText = "Connecting to Google...";
            
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            
            // Redirect method zyada stable hai mobile apps ke liye
            auth.signInWithRedirect(provider);
        }

        // 3. User Data Handler
        function handleUser(user) {
            document.getElementById('status-text').innerText = "Checking Database...";
            
            const userRef = db.ref('players/' + user.uid);
            
            userRef.once('value').then((snap) => {
                if (snap.exists()) {
                    // User pehle se hai, seedha lobby bhejo
                    window.location.href = "lobby.html";
                } else {
                    // Naya User - Data Create Karo
                    document.getElementById('status-text').innerText = "Creating Account...";
                    
                    const newUser = {
                        email: user.email,
                        username: user.displayName || "Player_" + Math.floor(Math.random()*9999),
                        diamonds: 1000, // New user bonus
                        avatar: "👤",
                        banner: "🚩",
                        badge: "🎖️",
                        character: "🧍",
                        uid: user.uid,
                        inventory: {
                            avatars: ["👤"],
                            banners: ["🚩"],
                            badges: ["🎖️"],
                            characters: ["🧍"]
                        }
                    };

                    userRef.set(newUser).then(() => {
                        window.location.href = "lobby.html";
                    }).catch((dbErr) => {
                        alert("Database Write Error: " + dbErr.message + "\nCheck if Rules are set to true.");
                        document.getElementById('status').style.display = "none";
                    });
                }
            }).catch((authErr) => {
                alert("Auth Error: " + authErr.message);
            });
        }

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                handleUser(user);
            }
        });
    </script>
</body>
</html>
