<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Pro | Welcome</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #f3ba2f; --bg: #090b10; --panel: #161b22; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }

        /* Background Glow Animation */
        .glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(243,186,47,0.15) 0%, transparent 70%);
            z-index: 0; animation: pulse 4s infinite alternate;
        }

        .auth-container {
            background: var(--panel); padding: 40px 30px; border-radius: 25px;
            width: 100%; max-width: 320px; text-align: center;
            border: 1px solid #30363d; z-index: 1; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { color: var(--gold); margin-bottom: 30px; font-size: 28px; letter-spacing: 2px; }

        .inp-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; color: #8b949e; margin-left: 5px; }
        
        input {
            width: 100%; padding: 14px; margin-top: 5px; border-radius: 12px;
            border: 1px solid #30363d; background: #0d1117; color: white;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .btn-login { background: var(--gold); color: black; font-size: 16px; }
        .btn-signup { background: transparent; color: #8b949e; border: 1px solid #30363d; font-size: 14px; margin-top: 15px; }
        
        .btn:active { transform: scale(0.98); }
        .loading { opacity: 0.5; pointer-events: none; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="auth-container" id="auth-box">
        <h1>MUSLIM PRO</h1>
        
        <div class="inp-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>

        <div class="inp-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-login" id="main-btn" onclick="handleAuth('login')">LOGIN</button>
        <button class="btn btn-signup" onclick="handleAuth('signup')">Create New Account</button>
        
        <p id="msg" style="font-size: 11px; margin-top: 20px; color: #8b949e;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Check if already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('msg').innerText = "Redirecting to App...";
                window.location.href = "op.html"; // User ko main app pe bhej do
            }
        });

        async function handleAuth(type) {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('password').value;
            const btn = document.getElementById('main-btn');
            const msg = document.getElementById('msg');

            if(!e || !p) return alert("Email/Password daalein!");
            if(p.length < 6) return alert("Password 6 characters ka hona chahiye!");

            btn.classList.add('loading');
            msg.innerText = "Processing, please wait...";

            try {
                if(type === 'login') {
                    await auth.signInWithEmailAndPassword(e, p);
                    // OnAuthStateChanged handle karega redirect
                } else {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    // Naya account setup
                    await db.ref('users/' + res.user.uid).set({
                        name: "User_" + Math.floor(100+Math.random()*899),
                        diamonds: 500,
                        dp: '👤',
                        banner: '🇸🇦',
                        uid: Math.floor(1000 + Math.random() * 9000),
                        inventory: ['👤', '🇸🇦'],
                        isBanned: false
                    });
                    alert("Account Created! Redirecting...");
                    window.location.href = "op.html";
                }
            } catch (err) {
                alert("Error: " + err.message);
                btn.classList.remove('loading');
                msg.innerText = "";
            }
        }
    </script>
</body>
</html>
