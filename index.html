<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muslim Pro V14 - Inventory Fix</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #090b10; --panel: #161b22; --gold: #f3ba2f; --green: #238636; --blue: #1f6feb; --text: #e6edf3; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; border-top: 1px solid #30363d; height: 70px; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #8b949e; cursor: pointer; }
        .nav-btn.active { color: var(--gold); border-top: 2px solid var(--gold); }

        /* Screens */
        .screen { display: none; padding: 20px; padding-bottom: 90px; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .active-screen { display: block; }

        /* Hadees & Quran Cards */
        .card { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 15px; text-align: center; }
        .hadees-box { border: 2px solid var(--gold); min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; }

        /* Store & Inventory Grid */
        .section-title { color: var(--gold); margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .item-card { background: #1c2128; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #30363d; transition: 0.2s; }
        .item-emoji { font-size: 40px; display: block; margin-bottom: 10px; }
        
        /* Buttons */
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .owned { background: #2d333b !important; color: #555 !important; cursor: not-allowed; }

        /* PROFILE LOBBY - FIXED BANNER DISPLAY */
        .profile-container { border-radius: 25px; padding: 30px; text-align: center; border: 4px solid #fff; position: relative; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); background-size: cover !important; background-position: center !important; }
        .p-img-circle { width: 90px; height: 90px; border-radius: 50%; background: white; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .badge-slot { position: absolute; bottom: 85px; right: 33%; background: var(--gold); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; border: 2px solid #1c2128; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- DEEN SCREEN -->
    <div id="deen-screen" class="screen active-screen">
        <h2 style="color:var(--gold)">Islamic Guidance</h2>
        <div class="card hadees-box" id="h-card">
            <small style="color:var(--gold)">📜 DAILY HADEES</small>
            <p id="hadees-text" style="margin: 15px 0;">"Actions are judged by intentions."</p>
            <button onclick="nextHadees()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:20px; font-size:12px;">FLIP HADEES</button>
        </div>

        <div class="card">
            <small style="color:var(--blue)">📖 QURAN VERSE</small>
            <p id="quran-text" style="font-style: italic;">Loading...</p>
        </div>
        
        <button onclick="watchAd()" class="btn btn-gold" style="padding:15px; font-size:16px;">📺 GET 20 DIAMONDS</button>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:18px;">LOBBY</b>
            <span style="background:rgba(243,186,47,0.1); color:var(--gold); padding:5px 12px; border-radius:20px; border:1px solid var(--gold);">💎 <span id="v-diamonds">0</span></span>
        </div>
        
        <!-- Profile with Dynamic Banner -->
        <div class="profile-container" id="v-banner-div">
            <div class="p-img-circle" id="v-dp">👤</div>
            <div class="badge-slot" id="v-badge">🎖️</div>
            <h2 id="v-name" style="margin:15px 0 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Player</h2>
            <div style="font-size:12px; opacity:0.8; background:rgba(0,0,0,0.5); display:inline-block; padding:2px 10px; border-radius:10px;">ID: <span id="v-uid">0</span></div>
        </div>
    </div>

    <!-- STORE SCREEN -->
    <div id="store-screen" class="screen">
        <h2 style="color:var(--gold)">Mega Store</h2>
        <p style="color:#8b949e; margin-top:-10px;">Cost: 300 Diamonds per item</p>
        <div id="store-render"></div>
    </div>

    <!-- EQUIPMENT SCREEN (DIVIDED SECTIONS) -->
    <div id="equip-screen" class="screen">
        <h2 style="color:var(--blue)">My Inventory</h2>
        <div id="inventory-render"></div>
    </div>

    <!-- NAVIGATION -->
    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="tab('deen-screen', this)">📖 Deen</div>
        <div class="nav-btn" onclick="tab('lobby-screen', this)">🏠 Lobby</div>
        <div class="nav-btn" onclick="tab('store-screen', this)">🛒 Store</div>
        <div class="nav-btn" onclick="tab('equip-screen', this)">🎒 Equip</div>
    </nav>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let uData = null;

        const hadeesList = [
            "Actions are judged by intentions.",
            "The best among you is he who is best to his family.",
            "Modesty is part of faith.",
            "A Muslim is a brother of another Muslim.",
            "The most beloved of deeds to Allah are the most consistent ones."
        ];

        // Store Items Categorized
        const shopItems = {
            DP: ["🦁","🦅","🐯","🐉","🔥","💎","🌟","⚔️","👑","⚽","🎮","🧿","☪️","🕋","🕌"],
            BANNER: ["🔴","🔵","🟢","🟡","🟣","🟠","⚫","🌈","🌊","❄️","✨","🌙","🕋"],
            BADGE: ["🥇","🥈","🥉","🏆","🎖️","🏅","🔱","🚀","⚡","🔥"]
        };

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/'+user.uid).on('value', s => {
                    uData = s.val();
                    if(uData) updateAppUI();
                });
            } else { auth.signInAnonymously(); }
        });

        function updateAppUI() {
            // Lobby Sync
            document.getElementById('v-name').innerText = uData.name || "User";
            document.getElementById('v-diamonds').innerText = uData.diamonds || 0;
            document.getElementById('v-dp').innerText = uData.dp || '👤';
            document.getElementById('v-badge').innerText = uData.badge || '🎖️';
            document.getElementById('v-uid').innerText = uData.uid || '0000';
            
            // BANNER FIX: Update Background Color/Style
            const bannerDiv = document.getElementById('v-banner-div');
            const currentBanner = uData.banner || '#1c2128';
            
            // Check if banner is a color hex or an emoji/string
            if(currentBanner.startsWith('#')) {
                bannerDiv.style.background = currentBanner;
            } else {
                // If it's an emoji/gradient simulation
                bannerDiv.style.background = "linear-gradient(45deg, #161b22, #30363d)";
                bannerDiv.style.borderColor = "#f3ba2f";
            }

            // Store Render
            let sHtml = '';
            for(let cat in shopItems) {
                sHtml += `<div class="section-title">${cat}s</div><div class="grid">`;
                shopItems[cat].forEach(item => {
                    let owned = (uData.inventory || []).includes(item);
                    sHtml += `<div class="item-card"><span class="item-emoji">${item}</span>
                    <button onclick="buy('${item}')" class="btn btn-gold ${owned?'owned':''}" ${owned?'disabled':''}>${owned?'OWNED':'300 💎'}</button></div>`;
                });
                sHtml += `</div>`;
            }
            document.getElementById('store-render').innerHTML = sHtml;

            // INVENTORY RENDER (DIVIDED SECTIONS)
            let iHtml = '';
            for(let cat in shopItems) {
                // Filter user's inventory to match this category
                let filteredItems = (uData.inventory || []).filter(item => shopItems[cat].includes(item));
                
                if(filteredItems.length > 0) {
                    iHtml += `<div class="section-title">My ${cat}s</div><div class="grid">`;
                    filteredItems.forEach(item => {
                        iHtml += `<div class="item-card"><span class="item-emoji">${item}</span>
                        <button onclick="equip('${item}', '${cat}')" class="btn btn-blue">EQUIP</button></div>`;
                    });
                    iHtml += `</div>`;
                }
            }
            document.getElementById('inventory-render').innerHTML = iHtml || "<p style='text-align:center; opacity:0.5;'>Inventory khali hai.</p>";
        }

        function nextHadees() {
            const hText = document.getElementById('hadees-text');
            hText.style.opacity = 0;
            setTimeout(() => {
                hText.innerText = hadeesList[Math.floor(Math.random()*hadeesList.length)];
                hText.style.opacity = 1;
            }, 300);
        }

        function buy(item) {
            if(uData.diamonds >= 300) {
                let inv = uData.inventory || [];
                inv.push(item);
                db.ref('users/'+auth.currentUser.uid).update({ 
                    diamonds: uData.diamonds - 300, 
                    inventory: inv 
                });
                alert("Mubarak! Khareed liya.");
            } else alert("Diamonds kam hain bhai!");
        }

        function equip(item, cat) {
            let updateObj = {};
            if(cat === "DP") updateObj.dp = item;
            if(cat === "BANNER") updateObj.banner = item; // Emoji/Style based banner
            if(cat === "BADGE") updateObj.badge = item;
            
            db.ref('users/'+auth.currentUser.uid).update(updateObj);
            alert(cat + " badal diya gaya!");
        }

        function watchAd() {
            window.open('https://pl29384318.profitablecpmratenetwork.com/35/57/7f/35577f1a0d6a720c6ba42103062b9527.js', '_blank');
            setTimeout(() => {
                db.ref('users/'+auth.currentUser.uid+'/diamonds').transaction(d => (d||0)+20);
                alert("20 Diamonds mil gaye!");
            }, 5000);
        }

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            el.classList.add('active');
        }

        // Random Quran Ayat
        fetch('https://api.alquran.cloud/v1/ayah/random/en.asad').then(r=>r.json()).then(d => {
            document.getElementById('quran-text').innerText = d.data.text + " (" + d.data.surah.englishName + ")";
        });
    </script>
</body>
</html>
