<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muslim Pro V13 - Final</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #090b10; --panel: #161b22; --gold: #f3ba2f; --green: #238636; --blue: #1f6feb; --text: #e6edf3; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; border-top: 1px solid #30363d; height: 70px; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #8b949e; cursor: pointer; }
        .nav-btn.active { color: var(--gold); border-top: 2px solid var(--gold); }

        /* Screens */
        .screen { display: none; padding: 20px; padding-bottom: 90px; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .active-screen { display: block; }

        /* Hadees Flip Card */
        .hadees-container { perspective: 1000px; margin-bottom: 20px; }
        .hadees-card { background: var(--panel); padding: 20px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-anim { transform: rotateY(360deg); }

        /* Store & Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .item-card { background: #1c2128; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #30363d; }
        .item-emoji { font-size: 40px; display: block; margin-bottom: 10px; }
        
        /* Buttons */
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); margin-top: 10px; }
        .owned { background: #30363d !important; color: #8b949e !important; cursor: not-allowed; }

        /* Profile Lobby */
        .profile-card { border-radius: 20px; padding: 25px; text-align: center; border: 3px solid #fff; position: relative; margin-bottom: 15px; }
        .p-img { width: 80px; height: 80px; border-radius: 50%; background: white; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid #fff; }
        .badge-icon { position: absolute; bottom: 75px; right: 35%; background: var(--gold); width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid var(--panel); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- DEEN SCREEN -->
    <div id="deen-screen" class="screen active-screen">
        <h2 style="color:var(--gold)">Islamic Guidance</h2>
        <div class="hadees-container">
            <div id="h-card" class="hadees-card">
                <small style="color:var(--gold)">📜 HADEES</small>
                <p id="hadees-text" style="font-size: 16px; margin: 15px 0;">"The best among you are those who learn the Quran and teach it."</p>
            </div>
            <button onclick="nextHadees()" class="btn btn-outline">🔄 NEXT HADEES (FLIP)</button>
        </div>

        <div class="card" style="background:var(--panel); padding:15px; border-radius:15px; border:1px solid #333;">
            <small style="color:var(--blue)">📖 QURAN AYAT</small>
            <p id="quran-text" style="font-style: italic; margin-top:10px;">Loading...</p>
        </div>
        
        <button onclick="watchAd()" class="btn btn-gold" style="margin-top:20px; padding:15px;">📺 WATCH AD (+20 💎)</button>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span>MY PROFILE</span>
            <span style="color:var(--gold)">💎 <span id="v-diamonds">0</span></span>
        </div>
        <div class="profile-card" id="v-banner" style="background:#1c2128;">
            <div class="p-img" id="v-dp">👤</div>
            <div class="badge-icon" id="v-badge">🎖️</div>
            <h2 id="v-name" style="margin:10px 0 0;">Player</h2>
            <div style="font-size:12px; opacity:0.6;">UID: <span id="v-uid">0</span></div>
        </div>
    </div>

    <!-- STORE SCREEN -->
    <div id="store-screen" class="screen">
        <h2 style="color:var(--gold)">Grand Market</h2>
        <div id="store-render"></div>
    </div>

    <!-- EQUIP SCREEN -->
    <div id="equip-screen" class="screen">
        <h2>My Equipment</h2>
        <div id="inventory-render" class="grid"></div>
    </div>

    <!-- NAV -->
    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="tab('deen-screen', this)">📖 Deen</div>
        <div class="nav-btn" onclick="tab('lobby-screen', this)">🏠 Lobby</div>
        <div class="nav-btn" onclick="tab('store-screen', this)">🛒 Store</div>
        <div class="nav-btn" onclick="tab('equip-screen', this)">🎒 Equip</div>
    </nav>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let uData = null;

        // DATA: HADEES & STORE
        const hadeesList = [
            "The best of you is the one who is best to his wife.",
            "Cleanliness is half of faith (Iman).",
            "A good word is charity.",
            "He who does not show mercy, will not be shown mercy.",
            "Modesty is part of faith.",
            "Speak good or remain silent."
        ];

        const shopItems = {
            DP: ["👑","🔥","💎","🦁","🦅","🌑","🌟","🕶️","⚽","🥋","🎮","🎧","🧿","☪️","🕋","🕌"],
            BANNER: ["🔴","🔵","🟢","🟡","🟣","🟠","🟤","⚫","⚪","🌈","🔥","🌊","❄️","✨"],
            BADGE: ["🥇","🥈","🥉","🏆","🎖️","🏅","💎","🔱","🔰","🚀","⚡","🔥"]
        };

        // AUTH & SYNC
        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/'+user.uid).on('value', s => {
                    uData = s.val();
                    if(uData) refreshUI();
                });
            } else {
                auth.signInAnonymously(); // Auto login for ease
            }
        });

        function refreshUI() {
            document.getElementById('v-name').innerText = uData.name || "Player";
            document.getElementById('v-diamonds').innerText = uData.diamonds || 0;
            document.getElementById('v-dp').innerText = uData.dp || '👤';
            document.getElementById('v-badge').innerText = uData.badge || '🎖️';
            document.getElementById('v-uid').innerText = uData.uid || '00000';
            document.getElementById('v-banner').style.background = uData.banner || '#1c2128';

            // Store Render
            let sHtml = '';
            for(let cat in shopItems) {
                sHtml += `<h4 style="color:var(--gold); margin-top:20px;">${cat}s (300 💎)</h4><div class="grid">`;
                shopItems[cat].forEach(item => {
                    let owned = (uData.inventory || []).includes(item);
                    sHtml += `<div class="item-card"><span class="item-emoji">${item}</span>
                    <button onclick="buy('${item}')" class="btn btn-gold ${owned?'owned':''}" ${owned?'disabled':''}>${owned?'OWNED':'BUY'}</button></div>`;
                });
                sHtml += `</div>`;
            }
            document.getElementById('store-render').innerHTML = sHtml;

            // Inventory Render
            let iHtml = '';
            (uData.inventory || []).forEach(item => {
                iHtml += `<div class="item-card"><span class="item-emoji">${item}</span>
                <button onclick="equip('${item}')" class="btn btn-blue">EQUIP</button></div>`;
            });
            document.getElementById('inventory-render').innerHTML = iHtml;
        }

        // ACTIONS
        function nextHadees() {
            const card = document.getElementById('h-card');
            card.classList.add('flip-anim');
            setTimeout(() => {
                const rand = hadeesList[Math.floor(Math.random() * hadeesList.length)];
                document.getElementById('hadees-text').innerText = rand;
                card.classList.remove('flip-anim');
            }, 300);
        }

        function buy(item) {
            if(uData.diamonds >= 300) {
                let inv = uData.inventory || [];
                inv.push(item);
                db.ref('users/'+auth.currentUser.uid).update({ 
                    diamonds: uData.diamonds - 300, 
                    inventory: inv 
                });
                alert("Purchased!");
            } else alert("Need more Diamonds!");
        }

        function equip(item) {
            let type = 'dp';
            if(shopItems.BANNER.includes(item)) type = 'banner';
            if(shopItems.BADGE.includes(item)) type = 'badge';
            db.ref('users/'+auth.currentUser.uid).update({ [type]: item });
            alert("Equipped!");
        }

        function watchAd() {
            window.open('https://pl29384318.profitablecpmratenetwork.com/35/57/7f/35577f1a0d6a720c6ba42103062b9527.js', '_blank');
            setTimeout(() => {
                db.ref('users/'+auth.currentUser.uid+'/diamonds').transaction(d => (d||0)+20);
                alert("Claimed +20 Diamonds!");
            }, 5000);
        }

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            el.classList.add('active');
        }

        // Quran API
        fetch('https://api.alquran.cloud/v1/ayah/random/en.asad').then(r=>r.json()).then(d => {
            document.getElementById('quran-text').innerText = d.data.text + " (" + d.data.surah.englishName + ")";
        });
    </script>
</body>
</html>
