<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Pro Web</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --green: #064e3b; --gold: #d4af37; --white: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: #f0fdf4; }

        /* Auth */
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        #auth-box { background: var(--green); height: 100vh; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; }

        /* Profile Style */
        header { background: var(--green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .profile-container { position: relative; width: 60px; height: 60px; }
        .user-dp-sq { 
            width: 60px; height: 60px; background: white; 
            border-radius: 8px; /* Square with slight round corners */
            display: flex; align-items: center; justify-content: center; font-size: 35px;
            border: 2px solid var(--gold);
        }
        .user-badge-icon { 
            position: absolute; bottom: -5px; left: -5px; 
            background: var(--gold); border-radius: 3px; 
            width: 22px; height: 22px; display: flex; 
            align-items: center; justify-content: center; font-size: 14px;
        }

        /* Hadees Flip Card */
        .hadees-card {
            width: 100%; height: 150px; perspective: 1000px; margin-bottom: 15px;
        }
        .hadees-inner {
            position: relative; width: 100%; height: 100%; transition: transform 0.6s;
            transform-style: preserve-3d; cursor: pointer;
        }
        .hadees-card.flipped .hadees-inner { transform: rotateY(180deg); }
        .hadees-front, .hadees-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center; 
            border-radius: 15px; padding: 10px; text-align: center; box-sizing: border-box;
        }
        .hadees-front { background: var(--green); color: white; }
        .hadees-back { background: var(--gold); color: black; transform: rotateY(180deg); font-weight: bold; }

        /* Store & Inventory */
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .item-btn { border: 1px solid #ccc; padding: 10px; border-radius: 10px; text-align: center; background: white; }
        
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .main-btn { background: white; border: 2px solid var(--green); padding: 25px 10px; border-radius: 15px; font-weight: bold; text-align: center; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="auth-box" class="screen active">
        <h2>Islamic App</h2>
        <input type="text" id="name" placeholder="Name" style="width: 80%; padding: 10px; margin: 5px auto;">
        <input type="email" id="email" placeholder="Email" style="width: 80%; padding: 10px; margin: 5px auto;">
        <input type="password" id="pass" placeholder="Password" style="width: 80%; padding: 10px; margin: 5px auto;">
        <button onclick="handleAuth()" style="width: 50%; margin: 20px auto; padding: 10px; background: var(--gold); border: none; font-weight: bold;">Login / Join</button>
    </div>

    <div id="app-box" class="screen">
        <header>
            <div class="profile-container">
                <div class="user-dp-sq" id="display-dp">📖</div>
                <div class="user-badge-icon" id="display-badge">★</div>
            </div>
            <div style="text-align: center;">
                <b id="display-name">User</b><br>
                <small id="display-uid">UID: 0000</small>
            </div>
            <div>💎 <span id="display-diamonds">0</span></div>
            <div onclick="toggleSettings()" style="font-size: 25px; cursor: pointer;">⚙️</div>
        </header>

        <div class="grid-main">
            <div class="main-btn" onclick="openHadees()">📖 50 Hadees</div>
            <div class="main-btn" onclick="alert('Wazu Guide Coming Soon')">💧 Wazu</div>
            <div class="main-btn" onclick="alert('Muslim Faraiz')">☪️ Faraiz</div>
            <div class="main-btn" onclick="runQuiz()" style="background: var(--gold);">💎 Get Diamonds</div>
        </div>

        <div style="padding: 0 20px;">
            <button class="main-btn" style="width: 100%; margin-bottom: 10px;" onclick="openStore()">🛒 Store (Buy DP/Badge)</button>
            <button class="main-btn" style="width: 100%;" onclick="openInventory()">🎒 Equipment (My Items)</button>
        </div>
    </div>

    <div id="overlay">
        <button onclick="closeOverlay()" style="background: red; color: white; border: none; padding: 5px 15px; border-radius: 5px;">Close</button>
        <div id="overlay-content"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let uData = { diamonds: 0, myDps: ['📖'], myBadges: ['★'], dp: '📖', badge: '★', unlockedHadees: 50 };

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const name = document.getElementById('name').value;
            
            auth.createUserWithEmailAndPassword(email, pass).then(res => {
                const uid = Math.floor(1000 + Math.random() * 9000);
                uData.name = name; uData.uid = uid;
                db.ref('users/' + res.user.uid).set(uData);
                start(uData);
            }).catch(() => {
                auth.signInWithEmailAndPassword(email, pass).then(res => {
                    db.ref('users/' + res.user.uid).once('value', s => start(s.val()));
                });
            });
        }

        function start(data) {
            uData = data;
            document.getElementById('auth-box').classList.remove('active');
            document.getElementById('app-box').classList.add('active');
            updateUI();
        }

        function updateUI() {
            document.getElementById('display-name').innerText = uData.name;
            document.getElementById('display-uid').innerText = "UID: " + uData.uid;
            document.getElementById('display-diamonds').innerText = uData.diamonds;
            document.getElementById('display-dp').innerText = uData.dp;
            document.getElementById('display-badge').innerText = uData.badge;
        }

        function openStore() {
            const dps = ['💐','🌹','🥀','🌺','🏵️','🌻','🌿','🌼','🌸','💮'];
            const bdg = ['🥇','🥈','🥉','★','♪'];
            let html = `<h3>Store</h3><p>Diamonds: ${uData.diamonds}</p><h4>DPs (10 💎)</h4><div class="item-grid">`;
            dps.forEach(i => html += `<div class="item-btn">${i}<br><button onclick="buyItem('dp','${i}',10)">Buy</button></div>`);
            html += `</div><h4>Badges (15 💎)</h4><div class="item-grid">`;
            bdg.forEach(i => html += `<div class="item-btn">${i}<br><button onclick="buyItem('badge','${i}',15)">Buy</button></div>`);
            document.getElementById('overlay-content').innerHTML = html + `</div>`;
            document.getElementById('overlay').style.display = 'block';
        }

        function buyItem(type, item, price) {
            if(uData.diamonds >= price) {
                uData.diamonds -= price;
                if(type === 'dp') uData.myDps.push(item);
                else uData.myBadges.push(item);
                save(); updateUI(); alert("Bought! Check Inventory.");
            } else alert("Not enough diamonds!");
        }

        function openInventory() {
            let html = `<h3>Inventory</h3><h4>My DPs</h4><div class="item-grid">`;
            uData.myDps.forEach(i => html += `<div class="item-btn" onclick="equip('dp','${i}')">${i}</div>`);
            html += `</div><h4>My Badges</h4><div class="item-grid">`;
            uData.myBadges.forEach(i => html += `<div class="item-btn" onclick="equip('badge','${i}')">${i}</div>`);
            document.getElementById('overlay-content').innerHTML = html + `</div>`;
            document.getElementById('overlay').style.display = 'block';
        }

        function equip(type, val) {
            if(type === 'dp') uData.dp = val; else uData.badge = val;
            save(); updateUI(); alert("Equipped!");
        }

        function openHadees() {
            let html = `<h3>Hadees (${uData.unlockedHadees})</h3>`;
            for(let i=1; i<=uData.unlockedHadees; i++) {
                html += `<div class="hadees-card" onclick="this.classList.toggle('flipped')">
                    <div class="hadees-inner">
                        <div class="hadees-front">Hadees Number ${i} (Tap to Flip)</div>
                        <div class="hadees-back">Yahan Hadees ka tarjuma aiga...</div>
                    </div>
                </div>`;
            }
            html += `<button onclick="unlockMore()" style="width:100%; padding:15px; background:var(--gold); border:none; margin-top:10px;">Unlock 50 More (20 💎)</button>`;
            document.getElementById('overlay-content').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
        }

        function unlockMore() {
            if(uData.diamonds >= 20) {
                uData.diamonds -= 20; uData.unlockedHadees += 50;
                save(); updateUI(); openHadees();
            } else alert("Need 20 diamonds!");
        }

        function runQuiz() {
            let q = prompt("Islam ke kitne rukan hain? (5/6/7)");
            if(q == "5") { uData.diamonds += 25; save(); updateUI(); alert("Correct! +25 💎"); }
        }

        function save() { db.ref('users/' + auth.currentUser.uid).update(uData); }
        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
        function toggleSettings() { alert("Settings: savemoneysavelife786123@gmail.com\nPowered by: poweredmxa"); }
    </script>
</body>
</html>
