<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muslim Pro | Dashboard</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #090b10; --panel: #161b22; --gold: #f3ba2f; --blue: #1f6feb; --text: #e6edf3; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; border-top: 1px solid #30363d; height: 70px; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #8b949e; cursor: pointer; }
        .nav-btn.active { color: var(--gold); border-top: 2px solid var(--gold); }

        /* Screens */
        .screen { display: none; padding: 20px; padding-bottom: 90px; min-height: 100vh; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }

        /* Profile Card */
        .profile-card { position: relative; border-radius: 20px; padding: 40px 20px; text-align: center; border: 2px solid #30363d; margin-bottom: 20px; overflow: hidden; background: #1c2128; }
        .banner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 150px; opacity: 0.15; z-index: 0; pointer-events: none; }
        .profile-content { position: relative; z-index: 1; }
        .p-avatar { width: 95px; height: 95px; border-radius: 50%; background: white; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid var(--gold); box-shadow: 0 0 15px rgba(243,186,47,0.3); }

        /* Grid & Boxes */
        .section-title { color: var(--gold); font-size: 14px; margin: 20px 0 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .item-box { background: var(--panel); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #30363d; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-buy { background: var(--gold); color: #000; }
        .btn-equip { background: var(--blue); color: #fff; }
        .owned-tag { background: #21262d !important; color: #484f58 !important; cursor: default; }

        /* Hadees & Settings */
        .hadees-box { background: linear-gradient(145deg, #161b22, #0d1117); border-radius: 15px; padding: 25px; border: 1px solid var(--gold); text-align: center; font-style: italic; }
        .settings-item { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="lobby-screen" class="screen active-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b style="font-size:20px; letter-spacing:1px;">LOBBY</b>
            <span style="color:var(--gold); font-weight:bold; background:rgba(243,186,47,0.1); padding:5px 12px; border-radius:20px;">💎 <span id="v-diamonds">0</span></span>
        </div>

        <div class="profile-card">
            <div class="banner-overlay" id="v-banner-bg">🇸🇦</div>
            <div class="profile-content">
                <div class="p-avatar" id="v-dp">👤</div>
                <h2 id="v-name" style="margin:15px 0 5px; font-size:24px;">Loading...</h2>
                <div style="font-size:12px; opacity:0.6; font-family:monospace;">UID: <span id="v-uid">0000</span></div>
            </div>
        </div>

        <div class="section-title">Quick Actions</div>
        <div class="grid">
            <div class="item-box" onclick="location.href='store.html'">🛒 <br>Open Store</div>
            <div class="item-box" onclick="tab('equip-screen', document.querySelectorAll('.nav-btn')[3])">🎒 <br>My Inventory</div>
        </div>
    </div>

    <div id="deen-screen" class="screen">
        <h2 style="color:var(--gold)">Daily Guidance</h2>
        <div class="hadees-box">
            <p id="hadees-text" style="font-size: 18px; line-height: 1.5;">"Actions are judged by intentions."</p>
            <button onclick="nextHadees()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:20px; font-size:11px; margin-top:10px;">FLIP HADEES</button>
        </div>
        <button onclick="getAdDiamonds()" class="btn btn-buy" style="margin-top:20px; padding:15px;">📺 WATCH AD (+20 💎)</button>
    </div>

    <div id="equip-screen" class="screen">
        <h2 style="color:var(--blue)">My Inventory</h2>
        <div id="inventory-render"></div>
    </div>

    <div id="settings-screen" class="screen">
        <h2 style="color:#8b949e">Settings</h2>
        <div class="settings-item" onclick="auth.signOut()">
            <span>Logout Account</span>
            <span style="color:red">➔</span>
        </div>
        <div class="settings-item">
            <span>Help & Support</span>
            <span>✉️</span>
        </div>
        <p style="text-align:center; font-size:10px; color:#30363d; margin-top:50px;">Muslim Pro V18.0.1</p>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn" onclick="tab('deen-screen', this)">📖 Deen</div>
        <div class="nav-btn active" onclick="tab('lobby-screen', this)">🏠 Lobby</div>
        <div class="nav-btn" onclick="location.href='store.html'">🛒 Store</div>
        <div class="nav-btn" onclick="tab('equip-screen', this)">🎒 Equip</div>
        <div class="nav-btn" onclick="tab('settings-screen', this)">⚙️</div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let uData = null;

        const shopItems = {
            DP: ["🦁","🦅","🐯","🐉","🔥","💎","🌟","⚔️","👑","🎮","🧿","☪️","🕋","🕌"],
            BANNER: ["🇸🇦","🇵🇰","🏴","🚩","🌈","🌊","❄️","✨","🌙","🕋","🕌"]
        };

        auth.onAuthStateChanged(user => {
            if(!user) { window.location.href = "index.html"; }
            else {
                db.ref('users/'+user.uid).on('value', s => {
                    uData = s.val();
                    if(uData) {
                        if(uData.isBanned) { alert("Banned!"); auth.signOut(); }
                        refreshUI();
                    }
                });
            }
        });

        function refreshUI() {
            document.getElementById('v-name').innerText = uData.name || "Player";
            document.getElementById('v-diamonds').innerText = uData.diamonds || 0;
            document.getElementById('v-dp').innerText = uData.dp || "👤";
            document.getElementById('v-uid').innerText = uData.uid || "0000";
            document.getElementById('v-banner-bg').innerText = uData.banner || "🇸🇦";

            let iHtml = '';
            for(let cat in shopItems) {
                let mine = (uData.inventory || []).filter(i => shopItems[cat].includes(i));
                if(mine.length > 0) {
                    iHtml += `<div class="section-title">My ${cat}s</div><div class="grid">`;
                    mine.forEach(item => {
                        iHtml += `<div class="item-box"><h1>${item}</h1><button onclick="equip('${item}', '${cat}')" class="btn btn-equip">EQUIP</button></div>`;
                    });
                    iHtml += `</div>`;
                }
            }
            document.getElementById('inventory-render').innerHTML = iHtml || "<p style='text-align:center; opacity:0.5;'>Empty Inventory. Buy items from store!</p>";
        }

        function equip(item, cat) {
            let key = cat.toLowerCase();
            db.ref('users/'+auth.currentUser.uid).update({ [key]: item });
            alert("Equipped!");
        }

        function getAdDiamonds() {
            window.open('https://pl29384318.profitablecpmratenetwork.com/35/57/7f/35577f1a0d6a720c6ba42103062b9527.js', '_blank');
            setTimeout(() => {
                db.ref('users/'+auth.currentUser.uid+'/diamonds').transaction(d => (d||0)+20);
                alert("20 Diamonds added!");
            }, 5000);
        }

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            if(el) el.classList.add('active');
        }

        const hadees = ["The best among you is he who is best to his family.", "Modesty is part of faith.", "Actions are judged by intentions."];
        function nextHadees() {
            document.getElementById('hadees-text').innerText = hadees[Math.floor(Math.random()*hadees.length)];
        }
    </script>
</body>
</html>
